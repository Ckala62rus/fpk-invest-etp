services:
  backend-etp:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backend-etp
    working_dir: /var/www
    volumes:
      - ./docker/php/config/php.ini:/usr/local/etc/php/conf.d/40-custom.ini
      - ./docker/php/config/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini
      - ./src:/var/www
      - ./docker/php/logs:/var/log/php
    depends_on:
      postgres-etp:
        condition: service_healthy
      redis-etp:
        condition: service_started
    env_file:
      - .env
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-develop,debug}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal client_port=9003}
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=etp}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - etp

  nginx-etp:
    image: nginx:1.27-alpine
    container_name: nginx-etp
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/config/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/config/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/certs:/etc/nginx/certs
      - ./docker/nginx/htpasswd:/etc/nginx/htpasswd
      - ./docker/nginx/templates:/etc/nginx/templates
      - ./docker/nginx/logs:/var/log/nginx
      - ./src:/var/www
    depends_on:
      - backend-etp
    environment:
      NGINX_UPSTREAM: backend-etp:9000
    networks:
      - etp

  postgres-etp:
    image: postgres:16-alpine
    container_name: postgres-etp
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Точка монтирования — родительская папка; PGDATA — подкаталог (иначе .gitignore мешает initdb)
      - ./docker/postgres/data:/var/lib/postgresql
      - ./docker/postgres/logs:/var/log/postgresql
    environment:
      PGDATA: /var/lib/postgresql/pgdata
      POSTGRES_DB: ${POSTGRES_DB:-etp}
      POSTGRES_USER: ${POSTGRES_USER:-etp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etp}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etp} -d ${POSTGRES_DB:-etp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - etp

  redis-etp:
    image: redis:7-alpine
    container_name: redis-etp
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/redis/data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - etp

  pgadmin-etp:
    image: dpage/pgadmin4:8
    container_name: pgadmin-etp
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    volumes:
      # Данные pgAdmin — подкаталог storage (в родительской папке может быть .gitignore)
      - ./docker/pgadmin/data/storage:/var/lib/pgadmin
      # Преднастроенное подключение к postgres-etp
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@etp.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    depends_on:
      postgres-etp:
        condition: service_healthy
    networks:
      - etp

  # Раскомментировать после установки Laravel в src/
  # cron-etp:
  #   build:
  #     context: .
  #     dockerfile: docker/cron/cron.dockerfile
  #   container_name: cron-etp
  #   working_dir: /var/www
  #   volumes:
  #     - ./src:/var/www
  #   depends_on:
  #     - backend-etp
  #   networks:
  #     - etp

  # supervisor-etp:
  #   build:
  #     context: .
  #     dockerfile: docker/supervisor/supervisor.dockerfile
  #   container_name: supervisor-etp
  #   working_dir: /var/www
  #   volumes:
  #     - ./src:/var/www
  #   depends_on:
  #     - backend-etp
  #     - redis-etp
  #   networks:
  #     - etp

networks:
  etp:
    driver: bridge
